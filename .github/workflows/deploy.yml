name: Deploy Monitoring Stack

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > key
          chmod 600 key
          # Копируем файлы из текущего репозитория на сервер
          scp -o StrictHostKeyChecking=no -i key -r ./* ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/opt/monitoring/
          # Запускаем контейнеры
          ssh -o StrictHostKeyChecking=no -i key ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "
            cd /opt/monitoring &&
            docker compose down 2>/dev/null || true &&
            docker compose up -d
          "
